version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financial-data-grid
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    labels:
      - "com.financial-grid.description=High-Performance Financial Data Grid"
      - "com.financial-grid.version=1.0.0"
